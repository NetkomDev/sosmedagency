<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Perangkat - MisiCuan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f172a;
            --card: rgba(17, 24, 39, 0.85);
            --border: rgba(16, 185, 129, 0.2);
            --text: #f1f5f9;
            --muted: #94a3b8;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.3);
            --danger: #ef4444;
            --warning: #eab308;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 50% 0%, rgba(16, 185, 129, 0.1), transparent),
                radial-gradient(ellipse 50% 40% at 80% 80%, rgba(6, 182, 212, 0.06), transparent);
            pointer-events: none;
        }

        .card {
            position: relative;
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            text-align: center;
            backdrop-filter: blur(16px);
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.06);
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), #06b6d4, var(--accent));
        }

        .icon-ring {
            width: 96px;
            height: 96px;
            margin: 0 auto 1.5rem;
            border: 3px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 0 20px var(--accent-glow);
            transition: all 0.4s ease;
        }

        .icon-ring.loading {
            animation: pulse-ring 2s ease-in-out infinite;
        }

        .icon-ring.success {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .icon-ring.error {
            border-color: var(--danger);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
        }

        .icon-ring.warning {
            border-color: var(--warning);
            box-shadow: 0 0 30px rgba(234, 179, 8, 0.3);
        }

        @keyframes pulse-ring {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(16, 185, 129, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        #status {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 500;
            line-height: 1.6;
        }

        .btn-wa {
            display: inline-block;
            margin-top: 1.25rem;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            padding: 14px 32px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.875rem;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
        }

        .btn-wa:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
        }

        .btn-wa:active {
            transform: translateY(0);
        }

        .error-text {
            color: #fca5a5;
        }

        .warning-text {
            color: #fde047;
        }
    </style>

    <script type="module">
        import { SUPABASE_URL, SUPABASE_ANON_KEY } from './supabase.js';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // =======================================
        // Advanced Device Fingerprint Generator
        // =======================================
        async function generateFingerprint() {
            const components = [];

            // 1. Basic browser info
            components.push(navigator.userAgent || '');
            components.push(navigator.language || '');
            components.push(navigator.hardwareConcurrency || 0);
            components.push(`${screen.width}x${screen.height}x${screen.colorDepth}`);
            components.push(navigator.platform || '');

            // 2. Timezone
            try {
                components.push(Intl.DateTimeFormat().resolvedOptions().timeZone || '');
                components.push(new Date().getTimezoneOffset());
            } catch (e) { components.push('tz-err'); }

            // 3. Canvas Fingerprint
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 240;
                canvas.height = 60;
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'alphabetic';
                ctx.fillStyle = '#f60';
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = '#069';
                ctx.font = '14px Arial';
                ctx.fillText('MisiCuan FP', 2, 15);
                ctx.fillStyle = 'rgba(102,204,0,0.7)';
                ctx.font = '18px Georgia';
                ctx.fillText('MisiCuan FP', 4, 45);
                ctx.beginPath();
                ctx.arc(50, 50, 50, 0, Math.PI * 2, true);
                ctx.closePath();
                ctx.fill();
                const gradient = ctx.createLinearGradient(0, 0, 240, 0);
                gradient.addColorStop(0, 'red');
                gradient.addColorStop(1, 'blue');
                ctx.fillStyle = gradient;
                ctx.fillRect(100, 30, 80, 20);
                components.push(canvas.toDataURL());
            } catch (e) { components.push('canvas-err'); }

            // 4. WebGL Renderer
            try {
                const glCanvas = document.createElement('canvas');
                const gl = glCanvas.getContext('webgl') || glCanvas.getContext('experimental-webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        components.push(gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) || '');
                        components.push(gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) || '');
                    }
                    components.push(gl.getParameter(gl.VERSION) || '');
                    components.push(gl.getParameter(gl.MAX_TEXTURE_SIZE) || '');
                }
            } catch (e) { components.push('webgl-err'); }

            // 5. Audio context fingerprint
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                components.push(audioCtx.sampleRate || '');
                components.push(audioCtx.destination.maxChannelCount || '');
                audioCtx.close();
            } catch (e) { components.push('audio-err'); }

            // 6. Touch + memory
            components.push(navigator.maxTouchPoints || 0);
            components.push('ontouchstart' in window ? 1 : 0);
            components.push(navigator.deviceMemory || 'unknown');

            // Hash
            const raw = components.join('|||');
            const encoder = new TextEncoder();
            const data = encoder.encode(raw);

            try {
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 48);
            } catch (e) {
                let hash = 0;
                for (let i = 0; i < raw.length; i++) {
                    const char = raw.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash |= 0;
                }
                return Math.abs(hash).toString(36) + '-' + btoa(raw.substring(0, 64)).substring(0, 24);
            }
        }

        async function init() {
            const status = document.getElementById('status');
            const icon = document.getElementById('icon-container');
            const title = document.getElementById('title');
            const subtitle = document.getElementById('subtitle');

            const params = new URLSearchParams(window.location.search);
            const verifyToken = params.get('token');

            // ===== VALIDASI TOKEN OTP =====
            if (!verifyToken) {
                icon.classList.remove('loading');
                icon.classList.add('error');
                icon.innerHTML = '🚫';
                title.textContent = 'Akses Ditolak';
                subtitle.textContent = 'Halaman ini hanya bisa diakses melalui link dari Bot WhatsApp Dana Gacor.';
                status.innerHTML = '<span class="error-text">Token verifikasi tidak ditemukan.</span>';
                return;
            }

            // Query token dari database
            const { data: tokenData, error: tokenErr } = await supabase
                .from('verify_tokens')
                .select('*')
                .eq('token', verifyToken)
                .eq('used', false)
                .single();

            if (tokenErr || !tokenData) {
                icon.classList.remove('loading');
                icon.classList.add('error');
                icon.innerHTML = '❌';
                title.textContent = 'Token Tidak Valid';
                subtitle.textContent = 'Token sudah digunakan atau kedaluwarsa. Minta token baru melalui bot.';
                status.innerHTML = '<span class="error-text">Silakan ketik "menu" di bot untuk memulai kembali.</span>';
                return;
            }

            // Cek expired
            if (new Date(tokenData.expires_at) < new Date()) {
                icon.classList.remove('loading');
                icon.classList.add('warning');
                icon.innerHTML = '⏰';
                title.textContent = 'Token Kedaluwarsa';
                subtitle.textContent = 'Token ini sudah melewati batas waktu 10 menit.';
                status.innerHTML = '<span class="warning-text">Ketik "menu" di bot untuk mendapatkan token baru.</span>';
                return;
            }

            const userId = tokenData.user_id;

            // ===== MULAI VERIFIKASI =====
            try {
                const fingerprint = await generateFingerprint();

                // IP Fetch
                let ip_address = '0.0.0.0';
                try {
                    const res = await fetch('https://api.ipify.org?format=json', { signal: AbortSignal.timeout(3000) });
                    const json = await res.json();
                    ip_address = json.ip || '0.0.0.0';
                } catch (e) { /* keep default */ }

                // Cek duplikat: fingerprint + IP yang sama pada akun LAIN
                const { data: duplicates } = await supabase
                    .from('profiles')
                    .select('id, username')
                    .eq('device_fingerprint', fingerprint)
                    .eq('ip_address', ip_address)
                    .neq('id', userId)
                    .limit(1);

                if (duplicates && duplicates.length > 0) {
                    // Tandai token sebagai used
                    await supabase.from('verify_tokens').update({ used: true }).eq('token', verifyToken);

                    icon.classList.remove('loading');
                    icon.classList.add('warning');
                    icon.innerHTML = '⚠️';
                    title.textContent = 'Perangkat Sudah Terdaftar';
                    subtitle.innerHTML = `Perangkat ini sebelumnya ditautkan dengan akun lain. Satu perangkat hanya untuk 1 akun WhatsApp.`;
                    status.innerHTML = '<span class="warning-text">Silakan gunakan perangkat atau nomor sebelumnya.</span>';

                    await supabase.from('profiles').upsert({
                        id: userId,
                        device_fingerprint: fingerprint,
                        ip_address: ip_address,
                        is_device_verified: false
                    }, { onConflict: 'id' });
                    return;
                }

                // Save verified data
                const { error } = await supabase
                    .from('profiles')
                    .upsert({
                        id: userId,
                        device_fingerprint: fingerprint,
                        ip_address: ip_address,
                        is_device_verified: true
                    }, { onConflict: 'id' });

                if (error) throw error;

                // Tandai token sebagai used
                await supabase.from('verify_tokens').update({ used: true }).eq('token', verifyToken);

                // ✅ Success
                icon.classList.remove('loading');
                icon.classList.add('success');
                icon.innerHTML = '✅';
                title.textContent = 'Verifikasi Berhasil!';
                subtitle.textContent = 'Perangkat Anda telah diverifikasi. Kembali ke WhatsApp dan ketik 1 untuk melihat Daftar Misi.';
                status.innerHTML = '<button id="btn-wa-back" class="btn-wa">💬 Kembali ke WhatsApp</button>';

                document.getElementById('btn-wa-back').addEventListener('click', function () {
                    const waNumber = '628981593287';
                    const text = '1';
                    window.location.replace('whatsapp://send?phone=' + waNumber + '&text=' + text);
                    setTimeout(function () { try { window.close(); } catch (e) { } }, 300);
                    setTimeout(function () { window.location.href = 'https://wa.me/' + waNumber + '?text=' + text; }, 800);
                });

            } catch (err) {
                icon.classList.remove('loading');
                icon.classList.add('error');
                icon.innerHTML = '❌';
                title.textContent = 'Gagal Memverifikasi';
                subtitle.textContent = err.message;
                status.innerHTML = '<button onclick="location.reload()" style="color: var(--accent); text-decoration: underline; background: none; border: none; cursor: pointer; font-family: inherit;">Coba Lagi</button>';
            }
        }

        init();
    </script>
</head>

<body>
    <div class="card">
        <div id="icon-container" class="icon-ring loading">
            <div class="spinner"></div>
        </div>

        <h1 id="title">Memeriksa Keamanan Perangkat</h1>
        <p id="subtitle" class="subtitle">Sistem mendeteksi dan mengamankan sidik jari digital Anda untuk mencegah
            multi-akun...</p>

        <p id="status"></p>
    </div>
</body>

</html>
