<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabung Pasukan Dana Gacor 💰</title>
    <meta name="description"
        content="Bergabunglah dengan Dana Gacor dan dapatkan komisi instan dengan mengerjakan misi sosial media sederhana.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFC107;
            --secondary: #FF9800;
            --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Abstract background shapes */
        .bg-shape {
            position: absolute;
            z-index: -1;
            filter: blur(80px);
            border-radius: 50%;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: var(--primary);
            top: -100px;
            left: -100px;
            opacity: 0.1;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: var(--secondary);
            bottom: -150px;
            right: -150px;
            opacity: 0.1;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 50px 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 40px;
            box-shadow: 0 10px 20px rgba(255, 193, 7, 0.3);
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            line-height: 1.7;
            color: #94a3b8;
            font-size: 17px;
            margin-bottom: 40px;
        }

        .highlight {
            color: var(--primary);
            font-weight: 700;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000;
            padding: 20px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 193, 7, 0.2);
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(255, 193, 7, 0.3);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .footer-text {
            margin-top: 30px;
            font-size: 13px;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="container">
        <div class="icon-box">💰</div>
        <h1>Dana Gacor</h1>
        <p>Anda diundang bergabung menjadi <span class="highlight">Pasukan Dana Gacor</span>. Selesaikan misi sosial
            media sederhana dan terima komisi instan setiap hari!</p>

        <button id="joinBtn" class="btn" onclick="redirectToWa()">
            Mulai Cari Cuan Sekarang 🚀
        </button>

        <div class="footer-text">Official Dana Gacor Platform</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let refId = urlParams.get('ref') || '';
        if (refId) {
            refId = ` ID:REF${refId}`;
        }

        async function fetchBotNumber() {
            // Nomor bot Dana Gacor:
            return '628981593287';
        }

        async function redirectToWa() {
            const btn = document.getElementById('joinBtn');
            btn.innerHTML = `<span>Proses...</span>`;
            btn.disabled = true;

            const botNumber = await fetchBotNumber();
            const prefilledText = `Halo admin, saya ingin daftar Dana Gacor.${refId}`;
            const waLink = `https://wa.me/${botNumber}?text=${encodeURIComponent(prefilledText)}`;

            setTimeout(() => {
                window.location.href = waLink;
            }, 600);
        }
    </script>
</body>

</html>
